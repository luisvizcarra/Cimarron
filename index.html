<!DOCTYPE html>
<html>
<head>
    <title>Mundial AR - Conecta 4</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #ui { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; font-family: 'Arial Rounded MT Bold', sans-serif; text-align: center; pointer-events: none; width: 100%; }
        .mensaje { background: rgba(255,255,255,0.95); color: #2c3e50; padding: 10px 25px; border-radius: 30px; border: 4px solid #CC7722; font-size: 22px; display: inline-block; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s; }
        .btn-reset { pointer-events: auto; background: #2c3e50; border: none; padding: 12px 25px; color: white; border-radius: 25px; cursor: pointer; font-size: 16px; box-shadow: 0 5px #1a252f; transition: all 0.2s; font-weight: bold; }
        .btn-reset:active { box-shadow: 0 2px #1a252f; transform: translateY(3px); }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ui">
        <div id="mensaje" class="mensaje">¡Turno: EQUIPO OCRE!</div><br>
        <button class="btn-reset" onclick="location.reload()">🔄 REINICIAR PARTIDO</button>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;" 
        vr-mode-ui="enabled: false"
        cursor="rayOrigin: mouse"
        raycaster="objects: .col">
        
        <a-entity camera></a-entity>

        <a-marker preset="hiro">
            <a-entity id="escena-juego" position="0 0 0">
                
                <a-cylinder radius="2.2" height="0.1" color="#1e8449" opacity="0.8"></a-cylinder>
                <a-ring color="white" rotation="-90 0 0" radius-inner="2.1" radius-outer="2.2" position="0 0.06 0"></a-ring>

                <a-box id="tablero-visual" position="0 1.5 0" scale="3.8 3.3 0.15" color="#2c3e50" metalness="0.5" roughness="0.2"></a-box>
                
                <a-entity id="interactores">
                    <a-box class="col" data-index="0" position="-1.5 1.5 0.2" scale="0.45 3 0.1" opacity="0" color="#fff"></a-box>
                    <a-box class="col" data-index="1" position="-1.0 1.5 0.2" scale="0.45 3 0.1" opacity="0" color="#fff"></a-box>
                    <a-box class="col" data-index="2" position="-0.5 1.5 0.2" scale="0.45 3 0.1" opacity="0" color="#fff"></a-box>
                    <a-box class="col" data-index="3" position="0.0 1.5 0.2" scale="0.45 3 0.1" opacity="0" color="#fff"></a-box>
                    <a-box class="col" data-index="4" position="0.5 1.5 0.2" scale="0.45 3 0.1" opacity="0" color="#fff"></a-box>
                    <a-box class="col" data-index="5" position="1.0 1.5 0.2" scale="0.45 3 0.1" opacity="0" color="#fff"></a-box>
                    <a-box class="col" data-index="6" position="1.5 1.5 0.2" scale="0.45 3 0.1" opacity="0" color="#fff"></a-box>
                </a-entity>
            </a-entity>
        </a-marker>
    </a-scene>

    <script>
        const COLS = 7, FILAS = 6;
        let tableroLógica = Array(COLS).fill().map(() => Array(FILAS).fill(null));
        let conteoFichas = Array(COLS).fill(0);
        let turno = "ocre";
        let juegoActivo = true;

        const config = {
            ocre: { hex: "#CC7722", nombre: "OCRE" },
            verde: { hex: "#2ECC71", nombre: "VERDE" }
        };

        document.querySelectorAll('.col').forEach(col => {
            col.addEventListener('click', function() {
                if (!juegoActivo) return;
                
                const c = parseInt(this.getAttribute('data-index'));
                const f = conteoFichas[c];

                if (f < FILAS) {
                    tableroLógica[c][f] = turno;
                    const xPos = -1.5 + (c * 0.5);
                    const yPos = 0.25 + (f * 0.5);
                    
                    crearFicha(xPos, yPos, config[turno].hex);

                    if (verificarGanador(c, f)) {
                        finalizarJuego(`¡CAMPEÓN EQUIPO ${config[turno].nombre}! 🏆`);
                    } else {
                        conteoFichas[c]++;
                        turno = (turno === "ocre") ? "verde" : "ocre";
                        actualizarUI();
                    }
                }
            });
        });

        function crearFicha(x, y, color) {
            const f = document.createElement('a-sphere');
            f.setAttribute('position', `${x} 5 0.1`); 
            f.setAttribute('radius', '0.22');
            f.setAttribute('color', color);
            f.setAttribute('material', 'roughness: 0.4; metalness: 0.3');
            
            f.setAttribute('animation', {
                property: 'position',
                to: `${x} ${y} 0.1`,
                dur: 800,
                easing: 'easeOutBounce'
            });
            
            document.querySelector('#escena-juego').appendChild(f);
        }

        function actualizarUI() {
            const msj = document.getElementById('mensaje');
            msj.innerText = `Turno: ${config[turno].nombre}`;
            msj.style.borderColor = config[turno].hex;
            msj.style.color = config[turno].hex;
        }

        function finalizarJuego(texto) {
            juegoActivo = false;
            const msj = document.getElementById('mensaje');
            msj.innerText = texto;
            msj.style.background = "#FFD700"; // Color Oro
            msj.style.color = "#2c3e50";
            document.getElementById('tablero-visual').setAttribute('color', '#f1c40f'); // El tablero brilla
        }

        function verificarGanador(c, f) {
            const colorActual = tableroLógica[c][f];
            const direcciones = [
               ,  // Horizontal
               ,  // Vertical
               ,  // Diagonal /
                [1, -1]  // Diagonal \
            ];
            
            for (let [dc, df] of direcciones) {
                let cuenta = 1 + contarEnDireccion(c, f, dc, df, colorActual) + 
                             contarEnDireccion(c, f, -dc, -df, colorActual);
                if (cuenta >= 4) return true;
            }
            return false;
        }

        function contarEnDireccion(c, f, dc, df, color) {
            let total = 0, nc = c + dc, nf = f + df;
            while (nc >= 0 && nc < COLS && nf >= 0 && nf < FILAS && tableroLógica[nc][nf] === color) {
                total++; nc += dc; nf += df;
            }
            return total;
        }
    </script>
</body>
</html>

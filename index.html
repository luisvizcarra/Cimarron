<!DOCTYPE html>
<html>
<head>
    <title>Conecta 4 AR - Super Reactivo</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #ui { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; font-family: 'Arial Rounded MT Bold', sans-serif; text-align: center; pointer-events: none; width: 100%; }
        .mensaje { background: rgba(255,255,255,0.9); color: #2c3e50; padding: 10px 20px; border-radius: 30px; border: 4px solid #3498db; font-size: 20px; display: inline-block; margin-bottom: 10px; }
        .btn-reset { pointer-events: auto; background: #FF5722; border: none; padding: 12px 25px; color: white; border-radius: 25px; cursor: pointer; font-size: 16px; box-shadow: 0 5px #bf360c; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ui">
        <div id="mensaje" class="mensaje">¡Apunta y toca una columna!</div><br>
        <button class="btn-reset" onclick="location.reload()">🔄 EMPEZAR DE NUEVO</button>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        vr-mode-ui="enabled: false">
        
        <a-entity camera>
            <a-cursor 
                fuse="false" 
                raycaster="objects: .col" 
                material="color: #FFEB3B; shader: flat" 
                geometry="primitive: ring; radiusInner: 0.007; radiusOuter: 0.01"
                position="0 0 -0.5">
            </a-cursor>
        </a-entity>

        <a-marker preset="hiro">
            <a-entity id="escena-juego" position="0 0 0">
                
                <a-cylinder radius="2" height="0.05" color="#34495e"></a-cylinder>

                <a-box position="0 1.5 0" scale="3.8 3.3 0.1" color="#2980b9" metalness="0.3"></a-box>
                
                <a-entity id="interactores">
                    <a-box class="col" data-index="0" position="-1.5 1.5 0.1" scale="0.45 3 0.2" opacity="0.1" color="#fff" animation__hover="property: components.material.material.opacity; to: 0.5; startEvents: mouseenter; dur: 100" animation__leave="property: components.material.material.opacity; to: 0.1; startEvents: mouseleave; dur: 100"></a-box>
                    <a-box class="col" data-index="1" position="-1.0 1.5 0.1" scale="0.45 3 0.2" opacity="0.1" color="#fff" animation__hover="property: components.material.material.opacity; to: 0.5; startEvents: mouseenter; dur: 100" animation__leave="property: components.material.material.opacity; to: 0.1; startEvents: mouseleave; dur: 100"></a-box>
                    <a-box class="col" data-index="2" position="-0.5 1.5 0.1" scale="0.45 3 0.2" opacity="0.1" color="#fff" animation__hover="property: components.material.material.opacity; to: 0.5; startEvents: mouseenter; dur: 100" animation__leave="property: components.material.material.opacity; to: 0.1; startEvents: mouseleave; dur: 100"></a-box>
                    <a-box class="col" data-index="3" position="0.0 1.5 0.1" scale="0.45 3 0.2" opacity="0.1" color="#fff" animation__hover="property: components.material.material.opacity; to: 0.5; startEvents: mouseenter; dur: 100" animation__leave="property: components.material.material.opacity; to: 0.1; startEvents: mouseleave; dur: 100"></a-box>
                    <a-box class="col" data-index="4" position="0.5 1.5 0.1" scale="0.45 3 0.2" opacity="0.1" color="#fff" animation__hover="property: components.material.material.opacity; to: 0.5; startEvents: mouseenter; dur: 100" animation__leave="property: components.material.material.opacity; to: 0.1; startEvents: mouseleave; dur: 100"></a-box>
                    <a-box class="col" data-index="5" position="1.0 1.5 0.1" scale="0.45 3 0.2" opacity="0.1" color="#fff" animation__hover="property: components.material.material.opacity; to: 0.5; startEvents: mouseenter; dur: 100" animation__leave="property: components.material.material.opacity; to: 0.1; startEvents: mouseleave; dur: 100"></a-box>
                    <a-box class="col" data-index="6" position="1.5 1.5 0.1" scale="0.45 3 0.2" opacity="0.1" color="#fff" animation__hover="property: components.material.material.opacity; to: 0.5; startEvents: mouseenter; dur: 100" animation__leave="property: components.material.material.opacity; to: 0.1; startEvents: mouseleave; dur: 100"></a-box>
                </a-entity>
            </a-entity>
        </a-marker>
    </a-scene>

    <script>
        const COLS = 7, FILAS = 6;
        let tablero = Array(COLS).fill().map(() => Array(FILAS).fill(null));
        let conteoFichas = Array(COLS).fill(0);
        let turno = "naranja";
        let juegoActivo = true;

        const config = {
            naranja: { hex: "#FF8C00", nombre: "NARANJA" },
            azul: { hex: "#00d2ff", nombre: "AZUL" }
        };

        // Lógica de interacción
        document.querySelectorAll('.col').forEach(col => {
            // Cambio de color visual al pasar el cursor
            col.addEventListener('mouseenter', function() {
                if(juegoActivo) this.setAttribute('color', '#F1C40F'); 
            });
            col.addEventListener('mouseleave', function() {
                if(juegoActivo) this.setAttribute('color', '#FFFFFF');
            });

            col.addEventListener('click', function() {
                if (!juegoActivo) return;
                
                const c = parseInt(this.getAttribute('data-index'));
                const f = conteoFichas[c];

                if (f < FILAS) {
                    tablero[c][f] = turno;
                    const xPos = -1.5 + (c * 0.5);
                    const yPos = 0.25 + (f * 0.5);
                    
                    crearFicha(xPos, yPos, config[turno].hex);

                    if (verificarGanador(c, f)) {
                        finalizarJuego(`¡VICTORIA ${config[turno].nombre}! 👑`);
                    } else {
                        conteoFichas[c]++;
                        turno = (turno === "naranja") ? "azul" : "naranja";
                        actualizarUI();
                    }
                }
            });
        });

        function crearFicha(x, y, color) {
            const f = document.createElement('a-sphere');
            f.setAttribute('position', `${x} 5 0`); // Caen desde muy arriba
            f.setAttribute('radius', '0.22');
            f.setAttribute('color', color);
            f.setAttribute('material', 'metalness: 0.4; roughness: 0.3');
            f.setAttribute('animation', `property: position; to: ${x} ${y} 0; dur: 800; easing: easeOutBounce`);
            document.querySelector('#escena-juego').appendChild(f);
        }

        function actualizarUI() {
            const msj = document.getElementById('mensaje');
            msj.innerText = `Turno: ${config[turno].nombre}`;
            msj.style.borderColor = config[turno].hex;
        }

        function finalizarJuego(texto) {
            juegoActivo = false;
            document.getElementById('mensaje').innerText = texto;
            document.getElementById('mensaje').style.background = "#2ecc71";
            document.getElementById('mensaje').style.color = "white";
        }

        function verificarGanador(c, f) {
            const colorActual = tablero[c][f];
            const direcciones = [,,, [1, -1]];
            for (let [dc, df] of direcciones) {
                let cuenta = 1 + contarEnDireccion(c, f, dc, df, colorActual) + contarEnDireccion(c, f, -dc, -df, colorActual);
                if (cuenta >= 4) return true;
            }
            return false;
        }

        function contarEnDireccion(c, f, dc, df, color) {
            let total = 0, nc = c + dc, nf = f + df;
            while (nc >= 0 && nc < COLS && nf >= 0 && nf < FILAS && tablero[nc][nf] === color) {
                total++; nc += dc; nf += df;
            }
            return total;
        }
    </script>
</body>
</html>
